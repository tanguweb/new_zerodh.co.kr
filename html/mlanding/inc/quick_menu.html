

<div class="layerwrite">
  <h2>간편 상담<i class="demo-icon icon-close" id="quick_close"></i></h2>
  <div class="wraper quick_counsel">
    <p>
      궁금하신 사항을 아래 문의 내용에 입력해주시면 <br>
      보다 빠르게 전화로 상담을 도와드립니다
    </p>
    <form id="frmMainCounsel_quick" name="frmMainCounsel_quick" autocomplete="new-password" onsubmit="return false;">

		<input type="hidden" id="HTTP_REFERER_side" name="HTTP_REFERER_side" value="<%=Request.ServerVariables("HTTP_REFERER")%>">
		<input type="hidden" id="HTTP_USER_AGENT_side" name="HTTP_USER_AGENT_side" value="<%=Request.ServerVariables("HTTP_USER_AGENT")%>">
		<input type="hidden" id="HTTP_DEVICE_TYPE_side" name="HTTP_DEVICE_TYPE_side" value="<%=getDeviceType()%>">
		<input type="hidden" id="HTTP_MEDIA_TYPE_side" name="HTTP_MEDIA_TYPE_side" value="<%=getMediaType()%>">

      <input type="hidden" name="isQuick" value="Y" />
      <input style="visibility: hidden; width: 0px; height: 0px;" />

      <table>
        <tbody>
          <tr>
            <th>이름</th>
            <td><input type="text" id="mainCounselUserName_quick" name="mainCounselUserName_quick" value="" maxlength="4" autocomplete="off" placeholder="이름을 입력하세요"></td>
          </tr>
          <tr>
            <th>연락처</th>
            <td><input type="text" id="mainCounselPhone_quick" name="mainCounselPhone_quick" value="" maxlength="15" autocomplete="off" placeholder="연락처를 입력하세요"></td>
          </tr>
          <tr>
            <th>문의내용</th>
            <td><textarea name="mainCounselContent_quick" id="mainCounselContent_quick" placeholder="궁금한 사항을 적어주세요" style="resize: none"></textarea></td>
          </tr>
        </tbody>
      </table>
      <p><input type="checkbox" id="mainCounselagree_quick" checked="checked"><label for="mainCounselagree_quick">개인정보수집동의 <a href="../board/personal_info.html" class="Counselagree_view">개인정보취급방침 </a></label></p>
      <input type="submit" onclick="return false;" style="display: none; visibility: hidden; width: 0px; height: 0px;">
      <input type="submit" value="상담신청하기" onclick="doMainCounsel_quick_Submit();return false;">
    </form>

	<script>
      var isMainCounselSubmit = false;

      function doMainCounsel_quick_Submit() {

        if ($.trim($("#mainCounselUserName_quick").val()) == "") {
          alert("이름을 입력해 주세요.");
          $("#mainCounselUserName_quick").focus();
          return;
        }

        if ($("#mainCounselUserName_quick").val().length < 2) {
          alert("이름을 2글자 이상 입력해 주세요.");
          $("#mainCounselUserName_quick").focus();
          return;
        }

        if ($.trim($("#mainCounselPhone_quick").val()) == "") {
          alert("연락처를 입력해 주세요.");
          $("#mainCounselPhone_quick").focus();
          return;
        }

        if (ValPhone_V3($("#mainCounselPhone_quick").val(), "", true) == false && ValNumber_V3($("#mainCounselPhone_quick").val(), "", true) == false) {
          alert("올바른 연락처 형식이 아닙니다.\n\r연락처를 확인해주세요.");
          $("#mainCounselPhone_quick").focus();
          return;
        }

        if ($.trim($("#mainCounselContent_quick").val()) == "") {
          alert("문의내용을 입력해 주세요.");
          $("#mainCounselContent_quick").focus();
          return;
        }

        if ($("#mainCounselContent_quick").val().length < 2) {
          alert("문의내용을 2글자 이상 입력해 주세요.");
          $("#mainCounselContent_quick").focus();
          return;
        }


        if ($("#mainCounselagree_quick").is(":checked") == false) {
          alert("개인정보취급방침에 동의해주세요.");
          $("#mainCounselagree_quick").focus();
          return;
        }

        if (isMainCounselSubmit == false) {
          $.ajax({
            type: "post",
            url: "/controller/mainCounselController.asp",
            dataType: "json",
            data: $("#frmMainCounsel_quick").serialize(),
            async: false,
            beforeSend: function() {
              isMainCounselSubmit = true;
            },
            success: function(data) {
              //alert(data.toString());
              //alert(JSON.stringify(data));
              //return;

              if (data.result == "SUCCESS") {
                alert("등록 되었습니다.");
                document.location.reload();
                return;
              } else {
                isMainCounselSubmit = false;
                alert("등록에 실패하였습니다.");
                return;
              }
            },
            error: function(data, status, err) {
              isMainCounselSubmit = false;
              alert("서버와의 통신이 실패했습니다.");
              console.log("서버와의 통신이 실패했습니다. data : " + data + ", status : " + status + ", err : " + err);
            },
            complete: function() {
              isMainCounselSubmit = false;
            }
          });
        }
      }
    </script>

    <!-- E : main_counsel -->
  </div>
</div>

  $("#quick_close , .dim_bg").click(function() {
    $('.layerwrite,  .dim_bg').fadeOut();
  });
