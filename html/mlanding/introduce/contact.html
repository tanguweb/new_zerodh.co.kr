        <div class="title" data-aos="fade-up">
          <h2>오시는 길</h2>
          <h5><%=m_client_name_s%>로 쉽고 빠르게 <br class="mobile">오시는 길을 확인하세요</h5>
        </div>

        <h4 class="  m_b_10 " data-aos="fade-up" data-aos-delay="100">

        <div id="map2" data-aos="fade-up" data-aos-delay="400" ></div>
        <!-- <div class="bus" data-aos="fade-up" data-aos-delay="400">
          <h5>지하철로 오실 경우</h5>
          <p><span class="nine">9</span>호선 <em class="color_sub">신반포역 3번출구</em> 직진</p>
          <p class="m_t_10"><span>3</span><span>7</span><span class="nine">9</span>호선 <em class="color_sub">고속터미널역 6번출구</em> 직진</p>

        </div> -->
        <script>
          $(window).load(function() {

            var mapContainer = document.getElementById('map2'), // 지도를 표시할 div
                mapOption = {
                    center: new kakao.maps.LatLng(33.450701, 126.570667), // 지도의 중심좌표
                    level: 3 // 지도의 확대 레벨
                };

            // 지도를 생성합니다
            var map = new kakao.maps.Map(mapContainer, mapOption);

            // 주소-좌표 변환 객체를 생성합니다
            var geocoder = new kakao.maps.services.Geocoder();

            // 주소로 좌표를 검색합니다
            geocoder.addressSearch('<%=m_client_address1%>', function(result, status) {

                // 정상적으로 검색이 완료됐으면
                 if (status === kakao.maps.services.Status.OK) {

                    var coords = new kakao.maps.LatLng(result[0].y, result[0].x);

                    // 결과값으로 받은 위치를 마커로 표시합니다
                    var marker = new kakao.maps.Marker({
                        map: map,
                        position: coords
                    });

                    // 인포윈도우로 장소에 대한 설명을 표시합니다
                    var infowindow = new kakao.maps.InfoWindow({
                      content: '<div class="map_marker"><p><%=m_client_name%></p></div>'
                    });
                    infowindow.open(map, marker);

                    // 지도의 중심을 결과값으로 받은 위치로 이동시킵니다
                    map.setCenter(coords);
                }
            })


          });
        </script>
        <a href="http://kko.to/M5KyhrCdm" target="_blank" data-aos="fade-up" data-aos-delay="400">큰지도보기</a>

      </div>
    </section>
